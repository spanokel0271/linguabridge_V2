<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="LinguaBridge"/>
  <meta name="theme-color" content="#f0ece8"/>
  <title>LinguaBridge · DE ↔ PL</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#f0ece8; --surface:#faf7f4; --card:#fff;
      --a1:#b5c9a1; --a2:#c4b0d8; --a3:#f4c4a8;
      --text:#3a3530; --muted:#9b948e; --border:#e8e2dc;
      --sh:0 4px 28px rgba(90,70,50,.09); --r:20px; --rs:13px;
    }

    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }

    html, body {
      height: 100%;
    }

    body {
      font-family:'DM Sans',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background-image:
        radial-gradient(circle at 12% 15%,rgba(181,201,161,.3) 0%,transparent 45%),
        radial-gradient(circle at 88% 80%,rgba(196,176,216,.26) 0%,transparent 40%);
    }

    /* ── WRAPPER ── */
    .wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 12px 14px 24px;
    }

    /* ── TOP BAR ── */
    .top-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    .ui-lang-bar { display:flex; gap:6px }
    .ui-lang-btn {
      background:var(--card); border:1.5px solid var(--border);
      border-radius:50px; padding:5px 13px;
      font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500;
      color:var(--muted); cursor:pointer; transition:all .2s;
    }
    .ui-lang-btn.active {
      border-color:var(--a2); color:var(--text);
      background:linear-gradient(135deg,#f5f0fb,#ede8f5);
    }

    /* ── HEADER ── */
    header {
      text-align:center;
      padding: 6px 0 14px;
      flex-shrink: 0;
      animation:fadeUp .4s ease both;
    }
    .logo-pill {
      display:inline-flex; align-items:center; gap:8px;
      background:var(--card); border-radius:50px;
      padding:5px 14px; box-shadow:var(--sh);
      border:1px solid var(--border); margin-bottom:10px;
    }
    .logo-dot {
      width:24px; height:24px; border-radius:50%;
      background:linear-gradient(135deg,var(--a1),var(--a2));
      display:flex; align-items:center; justify-content:center; font-size:12px;
    }
    .logo-name { font-family:'Fraunces',serif; font-size:13px; font-weight:500 }
    h1 {
      font-family:'Fraunces',serif;
      font-size:clamp(20px,5vw,38px);
      font-weight:300; line-height:1.2;
    }
    h1 em { font-style:italic; color:var(--a2) }
    .subtitle { color:var(--muted); font-size:12px; margin-top:4px; letter-spacing:.03em }

    /* ── CARD ── */
    .card {
      flex: 1;
      display: flex;
      flex-direction: column;
      background:var(--card);
      border-radius:var(--r);
      box-shadow:var(--sh);
      border:1px solid var(--border);
      overflow:hidden;
      animation:fadeUp .5s .1s ease both;
      min-height: 0;
    }

    /* ── LANG BAR ── */
    .lang-bar {
      display:flex; align-items:center; gap:9px;
      padding:10px 14px;
      background:var(--surface);
      border-bottom:1px solid var(--border);
      flex-shrink: 0;
    }
    .lang-pill {
      flex:1; display:flex; align-items:center; justify-content:center;
      gap:7px; background:var(--card); border:1.5px solid var(--border);
      border-radius:50px; padding:8px; font-size:13px; font-weight:500;
    }
    .lang-pill.src-active {
      border-color:var(--a1);
      background:linear-gradient(135deg,#f3f8f0,#edf5ea);
    }
    .lang-flag { font-size:18px }
    .swap-btn {
      width:40px; height:40px; border-radius:50%;
      background:var(--card); border:1.5px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; font-size:19px; flex-shrink:0;
      transition:transform .4s cubic-bezier(.68,-.55,.27,1.55),background .2s;
      -webkit-tap-highlight-color:transparent; user-select:none;
    }
    .swap-btn:active { background:var(--a1); border-color:var(--a1); transform:rotate(180deg) }

    /* ── PANELS ── */
    .panels {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    /* Desktop: nebeneinander ab 700px */
    @media (min-width: 700px) {
      .panels { flex-direction: row }
      .panel:first-child {
        border-right: 1px solid var(--border);
        border-bottom: none;
      }
      /* Auf Desktop: Textarea füllt verfügbaren Platz */
      .panel { min-height: 0 }
      textarea { min-height: 0; height: 100% }
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .panel:first-child { border-bottom: 1px solid var(--border) }

    .panel-lbl {
      padding:10px 14px 0;
      font-size:10px; font-weight:500;
      letter-spacing:.1em; text-transform:uppercase; color:var(--muted);
      flex-shrink: 0;
    }

    textarea {
      flex: 1;
      width:100%; border:none; outline:none; resize:none;
      padding:8px 14px 12px;
      font-family:'DM Sans',sans-serif; font-size:15px; line-height:1.8;
      background:transparent; color:var(--text);
      -webkit-appearance:none;
      /* Handy: feste Mindesthöhe */
      min-height: 140px;
    }

    /* Desktop: Textarea wächst mit Fenster */
    @media (min-width: 700px) {
      textarea { min-height: 200px }
      .wrapper { padding: 16px 32px 24px }
      header { padding: 8px 0 18px }
    }

    @media (min-width: 1000px) {
      textarea { min-height: 260px }
    }

    textarea::placeholder { color:#ccc7c1 }
    textarea[readonly] { background:#fafafa; cursor:default }

    .char-count {
      padding:0 14px 8px;
      font-size:10px; color:var(--muted); text-align:right;
      flex-shrink: 0;
    }

    /* ── ACTIONS ── */
    .actions {
      display:flex; align-items:center; gap:8px;
      padding:12px 14px;
      border-top:1px solid var(--border);
      background:var(--surface);
      flex-wrap:wrap;
      flex-shrink: 0;
    }

    .btn {
      display:inline-flex; align-items:center; gap:6px;
      border:none; border-radius:50px;
      padding:10px 20px;
      font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500;
      cursor:pointer; -webkit-tap-highlight-color:transparent;
      transition:transform .15s,box-shadow .15s;
      white-space: nowrap;
    }
    .btn:active:not(:disabled) { transform:scale(.96) }
    .btn:disabled { opacity:.45; cursor:not-allowed }

    .btn-primary {
      background:linear-gradient(135deg,var(--a1),#9ab888);
      color:#fff; box-shadow:0 4px 14px rgba(154,184,136,.4);
      font-size:15px; padding:11px 24px;
    }
    .btn-secondary { background:var(--card); color:var(--text); border:1.5px solid var(--border) }
    .btn-copy {
      background:linear-gradient(135deg,var(--a2),#b5a0cc);
      color:#fff; box-shadow:0 4px 14px rgba(181,160,204,.35);
    }
    .spacer { flex:1 }

    /* Auf sehr kleinen Handys: Buttons etwas kompakter */
    @media (max-width: 360px) {
      .btn { padding:9px 14px; font-size:13px }
      .btn-primary { padding:10px 18px; font-size:14px }
    }

    /* ── STATUS ── */
    .status-wrap { padding:0 14px 11px; min-height:24px; flex-shrink:0 }
    .status {
      display:none; align-items:center; gap:6px;
      font-size:12px; border-radius:50px; padding:4px 13px;
    }
    .status.show { display:inline-flex }
    .status.ok  { background:#ecf7e8; color:#4a7c3f }
    .status.err { background:#fdecea; color:#c0392b }

    /* ── SPINNER ── */
    .spin { animation:spin .7s linear infinite; display:none }
    .loading .spin { display:block }
    .loading .btn-txt { display:none }

    @keyframes spin    { to { transform:rotate(360deg) } }
    @keyframes fadeUp  { from { opacity:0; transform:translateY(14px) } to { opacity:1; transform:translateY(0) } }
  </style>
</head>
<body>
<div class="wrapper">

  <div class="top-bar">
    <div class="ui-lang-bar">
      <button class="ui-lang-btn active" id="uiDE" onclick="setUiLang('de')">🇩🇪 DE</button>
      <button class="ui-lang-btn"        id="uiPL" onclick="setUiLang('pl')">🇵🇱 PL</button>
    </div>
  </div>

  <header>
    <div class="logo-pill">
      <div class="logo-dot">🌿</div>
      <span class="logo-name">LinguaBridge</span>
    </div>
    <h1 id="headingTxt">Deutsch <em>↔</em> Polnisch</h1>
    <p class="subtitle" id="subtitleTxt">KI-Übersetzung · sinngemäß &amp; natürlich</p>
  </header>

  <div class="card">
    <div class="lang-bar">
      <div class="lang-pill src-active">
        <span class="lang-flag" id="flagSrc">🇩🇪</span>
        <span id="nameSrc">Deutsch</span>
      </div>
      <div class="swap-btn" onclick="swap()">⇄</div>
      <div class="lang-pill">
        <span class="lang-flag" id="flagTgt">🇵🇱</span>
        <span id="nameTgt">Polnisch</span>
      </div>
    </div>

    <div class="panels">
      <div class="panel">
        <div class="panel-lbl" id="lblInput">✏️ Eingabe</div>
        <textarea id="srcTxt" oninput="updateCount()"></textarea>
        <div class="char-count"><span id="charCnt">0</span> <span id="lblChars">Zeichen</span></div>
      </div>
      <div class="panel">
        <div class="panel-lbl" id="lblOutput">🌐 Übersetzung</div>
        <textarea id="tgtTxt" readonly></textarea>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="transBtn" onclick="doTranslate()">
        <svg class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        <span class="btn-txt" id="btnTranslateTxt">🌐 Übersetzen</span>
      </button>
      <button class="btn btn-secondary" onclick="clearAll()">🗑️ <span id="btnClearTxt">Leeren</span></button>
      <div class="spacer"></div>
      <button class="btn btn-copy" onclick="copyTxt()">📋 <span id="btnCopyTxt">Kopieren</span></button>
    </div>
    <div class="status-wrap"><span class="status" id="statusEl"></span></div>
  </div>

</div><!-- /wrapper -->

<script>
  const _d = [115,107,45,97,110,116,45,97,112,105,48,51,45,72,102,90,80,106,66,76,85,100,75,77,102,78,103,52,88,90,72,78,99,49,102,116,77,66,81,71,118,118,113,102,89,66,103,87,108,57,100,71,84,114,83,75,79,77,74,90,82,97,77,108,72,104,121,118,77,54,101,97,89,113,66,89,106,114,72,53,49,84,75,81,113,122,119,121,103,95,68,111,106,83,112,56,120,119,119,45,50,55,108,72,102,119,65,65];
  const _r = () => _d.map(n => String.fromCharCode(n)).join('');

  const T = {
    de: {
      heading:'Deutsch <em>↔</em> Polnisch', subtitle:'KI-Übersetzung · sinngemäß &amp; natürlich',
      lblInput:'✏️ Eingabe', lblOutput:'🌐 Übersetzung', lblChars:'Zeichen',
      placeholderIn:'Text eingeben …', placeholderOut:'Übersetzung erscheint hier …',
      btnTranslate:'🌐 Übersetzen', btnTranslating:'Übersetze …',
      btnClear:'Leeren', btnCopy:'Kopieren', btnCopied:'Kopiert!',
      ok:'✓ Übersetzung erfolgreich!', errNoText:'Bitte Text eingeben.',
      errServer:'Fehler: ', errNoCopy:'Kein Text zum Kopieren.',
    },
    pl: {
      heading:'Niemiecki <em>↔</em> Polski', subtitle:'Tłumaczenie AI · znaczeniowe i naturalne',
      lblInput:'✏️ Tekst wejściowy', lblOutput:'🌐 Tłumaczenie', lblChars:'znaki',
      placeholderIn:'Wpisz tekst …', placeholderOut:'Tłumaczenie pojawi się tutaj …',
      btnTranslate:'🌐 Tłumacz', btnTranslating:'Tłumaczę …',
      btnClear:'Wyczyść', btnCopy:'Kopiuj', btnCopied:'Skopiowano!',
      ok:'✓ Tłumaczenie gotowe!', errNoText:'Proszę wpisać tekst.',
      errServer:'Błąd: ', errNoCopy:'Brak tekstu do skopiowania.',
    },
  };

  const LANGS = {
    de:{ flag:'🇩🇪', nameDe:'Deutsch',  namePl:'Niemiecki' },
    pl:{ flag:'🇵🇱', nameDe:'Polnisch', namePl:'Polski' },
  };

  let uiLang = 'de';
  let dir    = 'de-pl';

  function setUiLang(lang) {
    uiLang = lang;
    document.getElementById('uiDE').classList.toggle('active', lang === 'de');
    document.getElementById('uiPL').classList.toggle('active', lang === 'pl');
    applyUi();
  }

  function applyUi() {
    const t = T[uiLang];
    const [s, tg] = dir === 'de-pl' ? ['de','pl'] : ['pl','de'];
    document.getElementById('headingTxt').innerHTML        = t.heading;
    document.getElementById('subtitleTxt').innerHTML       = t.subtitle;
    document.getElementById('lblInput').textContent        = t.lblInput;
    document.getElementById('lblOutput').textContent       = t.lblOutput;
    document.getElementById('lblChars').textContent        = t.lblChars;
    document.getElementById('btnTranslateTxt').textContent = t.btnTranslate;
    document.getElementById('btnClearTxt').textContent     = t.btnClear;
    document.getElementById('btnCopyTxt').textContent      = t.btnCopy;
    document.getElementById('srcTxt').placeholder          = t.placeholderIn;
    document.getElementById('tgtTxt').placeholder          = t.placeholderOut;
    document.getElementById('nameSrc').textContent = uiLang === 'de' ? LANGS[s].nameDe  : LANGS[s].namePl;
    document.getElementById('nameTgt').textContent = uiLang === 'de' ? LANGS[tg].nameDe : LANGS[tg].namePl;
  }

  function swap() {
    dir = dir === 'de-pl' ? 'pl-de' : 'de-pl';
    const [s, tg] = dir === 'de-pl' ? ['de','pl'] : ['pl','de'];
    document.getElementById('flagSrc').textContent = LANGS[s].flag;
    document.getElementById('flagTgt').textContent = LANGS[tg].flag;
    const src = document.getElementById('srcTxt');
    const tgt = document.getElementById('tgtTxt');
    const tmp = src.value; src.value = tgt.value; tgt.value = tmp;
    updateCount(); applyUi();
  }

  function updateCount() {
    document.getElementById('charCnt').textContent = document.getElementById('srcTxt').value.length;
  }

  async function doTranslate() {
    const text = document.getElementById('srcTxt').value.trim();
    const t = T[uiLang];
    if (!text) { showStatus(t.errNoText, 'err'); return; }
    const [s, tg] = dir === 'de-pl' ? ['de','pl'] : ['pl','de'];
    setLoading(true);

    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': _r(),
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1500,
          system: 'Du bist ein professioneller Übersetzer. Antworte NUR mit einem JSON-Objekt. Format: {"translation":"<Übersetzung>"}',
          messages: [{ role: 'user', content:
            `Übersetze den folgenden ${LANGS[s].nameDe}-Text ins ${LANGS[tg].nameDe}.
Sinngemäß, natürlich und flüssig – nicht wörtlich.
Kontext: Seniorenpflege, Pflegemaßnahmen, Medikamente, Alltagsunterstützung – einfühlsame und klare Sprache.
Text: """${text}"""`
          }],
        }),
      });

      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error?.message || 'API Fehler');
      const raw = data.content?.map(b => b.text || '').join('') || '';
      let parsed;
      try { parsed = JSON.parse(raw.replace(/```json|```/g, '').trim()); }
      catch { parsed = { translation: raw.trim() }; }
      document.getElementById('tgtTxt').value = parsed.translation || raw.trim();
      showStatus(t.ok, 'ok');
    } catch(e) {
      showStatus(t.errServer + e.message, 'err');
    } finally {
      setLoading(false);
    }
  }

  function setLoading(on) {
    const btn = document.getElementById('transBtn');
    btn.disabled = on;
    btn.classList.toggle('loading', on);
    document.getElementById('btnTranslateTxt').textContent = on ? T[uiLang].btnTranslating : T[uiLang].btnTranslate;
  }

  function showStatus(msg, type) {
    const el = document.getElementById('statusEl');
    el.textContent = msg; el.className = 'status show ' + type;
    setTimeout(() => el.classList.remove('show'), 4000);
  }

  function clearAll() {
    document.getElementById('srcTxt').value = '';
    document.getElementById('tgtTxt').value = '';
    updateCount();
  }

  function copyTxt() {
    const v = document.getElementById('tgtTxt').value;
    const t = T[uiLang];
    if (!v) { showStatus(t.errNoCopy, 'err'); return; }
    navigator.clipboard.writeText(v).then(() => {
      document.getElementById('btnCopyTxt').textContent = t.btnCopied;
      setTimeout(() => document.getElementById('btnCopyTxt').textContent = t.btnCopy, 2000);
    });
  }

  applyUi();
</script>
</body>
</html>
